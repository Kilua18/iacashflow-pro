# Workflow de deploiement GitHub Pages — iacashflow.pro
# Deploie automatiquement le site sur chaque push sur main

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'agents/**'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Preparer les fichiers
        run: |
          mkdir -p _site
          cp -r *.html _site/ 2>/dev/null || true
          cp -r *.css _site/ 2>/dev/null || true
          cp -r *.js _site/ 2>/dev/null || true
          cp -r js/ _site/js/ 2>/dev/null || true
          cp -r worker/ _site/worker/ 2>/dev/null || true
          cp robots.txt _site/ 2>/dev/null || true
          cp sitemap.xml _site/ 2>/dev/null || true
          cp CNAME _site/ 2>/dev/null || true
          find _site -type f | sort
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
